name: Run Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start containers
        run: docker compose up -d

      - name: Wait for container setup to complete
        run: |
          echo "Waiting for container entrypoint to complete setup..."
          for i in {1..30}; do
            if docker compose exec -T php test -f /usr/local/bin/composer 2>/dev/null; then
              echo "Container setup complete!"
              docker compose exec -T php composer --version
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Install dependencies
        run: docker compose exec -T php composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run tests
        run: docker compose exec -T php vendor/bin/phpunit

      - name: Run PHPStan
        run: docker compose exec -T php vendor/bin/phpstan analyse
        continue-on-error: true

      - name: Stop containers
        if: always()
        run: docker compose down
