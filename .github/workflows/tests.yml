name: Run Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start containers
        run: docker compose up -d

      - name: Wait for container to be ready
        run: sleep 3

      - name: Install PHP extensions
        run: |
          docker compose exec -T php apk add --no-cache libxml2-dev
          docker compose exec -T php docker-php-ext-install dom
          docker compose exec -T php docker-php-ext-install xml

      - name: Install Composer
        run: |
          docker compose exec -T php sh -c "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer"
          docker compose exec -T php composer --version

      - name: Install dependencies
        run: docker compose exec -T php composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run tests
        run: docker compose exec -T php vendor/bin/phpunit

      - name: Run PHPStan
        run: docker compose exec -T php vendor/bin/phpstan analyse
        continue-on-error: true

      - name: Stop containers
        if: always()
        run: docker compose down
