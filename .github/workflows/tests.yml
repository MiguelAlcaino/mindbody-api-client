name: Run Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start containers
        run: docker compose up -d

      - name: Wait for Composer to be installed
        run: |
          echo "Waiting for Composer to be installed in the container..."
          for i in {1..30}; do
            if docker compose exec -T php which composer > /dev/null 2>&1; then
              echo "Composer is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          docker compose exec -T php composer --version

      - name: Install dependencies
        run: docker compose exec -T php composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run tests
        run: docker compose exec -T php vendor/bin/phpunit

      - name: Run PHPStan
        run: docker compose exec -T php vendor/bin/phpstan analyse
        continue-on-error: true

      - name: Stop containers
        if: always()
        run: docker compose down
